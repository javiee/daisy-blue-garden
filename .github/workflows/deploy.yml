name: Deploy Only

on:
  workflow_dispatch:
    inputs:
          tag:
            description: "Image tag to deploy (leave empty to use the latest git tag)"
            required: false
            default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve TAG
        id: resolve-tag
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            TAG=$(git describe --tags --abbrev=0)
            echo "No tag provided, using the latest git tag: $TAG"
          else
            echo "Using provided tag: ${{ github.event.inputs.tag }}"
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-runner

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Pin host key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "${{ secrets.DEPLOY_COMMAND }}" "${{ steps.resolve-tag.outputs.tag }}"
