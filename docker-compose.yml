version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: daisyblue
      MYSQL_USER: daisyblue
      MYSQL_PASSWORD: daisyblue_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=mysql://daisyblue:daisyblue_pass@db:3306/daisyblue
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
  qcluster:
    build: ./backend
    command: python manage.py qcluster
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
      - DATABASE_URL=mysql://daisyblue:daisyblue_pass@db:3306/daisyblue
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  mysql_data:
  media_files:
